# ── Render deployment config ─────────────────────────────────────────────────
# https://render.com/docs/infrastructure-as-code

services:
  # Web service: runs the Express backend AND serves the built frontend
  - type: web
    name: telegram-channel-collector
    env: node
    region: oregon
    buildFilter:
      nodeVersion: 20

    # Build: install server deps AND build the frontend
    buildCommand: |
      cd server && npm install && cd .. && npm install && npm run build

    # Start: run the Express server in production mode
    startCommand: cd server && NODE_ENV=production node src/index.js

    # Environment variables
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      - key: JWT_SECRET
        generateValue: true

    # Health check
    healthCheckPath: /api/health
